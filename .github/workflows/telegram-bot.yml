name: Telegram bot

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/telegram-bot.yml"
      - "bot.py"
      - "requirements.txt"
      - "data/**"
  schedule:
    - cron: "*/5 6-23 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: telegram-bot
  cancel-in-progress: false

jobs:
  check-messages:
    name: Check Telegram messages
    runs-on: ubuntu-latest

    steps:
      - name: Check local bot hours
        id: bot-hours
        run: |
          hour="$(TZ=Europe/Lisbon date +%H)"
          if [ "$hour" -ge 7 ] && [ "$hour" -lt 23 ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository
        if: steps.bot-hours.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        if: steps.bot-hours.outputs.enabled == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.bot-hours.outputs.enabled == 'true'
        run: python -m pip install -r requirements.txt

      - name: Process pending Telegram updates
        if: steps.bot-hours.outputs.enabled == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          BOT_TIMEZONE: Europe/Lisbon
          DAILY_SEND_TIME: "08:00"
        run: python bot.py --once

      - name: Save bot state
        if: steps.bot-hours.outputs.enabled == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bot_state.json
          if git diff --cached --quiet; then
            echo "No bot state changes."
          else
            git commit -m "Update Telegram bot state"
            git pull --rebase
            git push
          fi
