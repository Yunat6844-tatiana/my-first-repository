name: Telegram bot

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/telegram-bot.yml"
      - "bot.py"
      - "requirements.txt"
      - "data/**"
  schedule:
    - cron: "*/5 6-23 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: telegram-bot
  cancel-in-progress: false

jobs:
  check-messages:
    name: Check Telegram messages
    runs-on: ubuntu-latest

    steps:
      - name: Check local bot hours
        id: bot-hours
        run: |
          hour="$(TZ=Europe/Lisbon date +%H)"
          if [ "$hour" -ge 7 ] && [ "$hour" -lt 23 ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository
        if: steps.bot-hours.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        if: steps.bot-hours.outputs.enabled == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.bot-hours.outputs.enabled == 'true'
        run: python -m pip install -r requirements.txt

      - name: Check Telegram token secret
        if: steps.bot-hours.outputs.enabled == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "::error::GitHub secret TELEGRAM_BOT_TOKEN is empty or missing."
            exit 1
          fi

      - name: Verify Telegram bot connection
        if: steps.bot-hours.outputs.enabled == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request

          token = os.environ["TELEGRAM_BOT_TOKEN"]
          url = f"https://api.telegram.org/bot{token}/getMe"
          data = urllib.parse.urlencode({}).encode("utf-8")
          request = urllib.request.Request(url, data=data)
          with urllib.request.urlopen(request, timeout=30) as response:
              payload = json.loads(response.read().decode("utf-8"))
          if not payload.get("ok"):
              raise SystemExit("Telegram getMe returned ok=false")
          bot = payload["result"]
          print(f"Connected to Telegram bot @{bot.get('username')} / id={bot.get('id')}")
          PY

      - name: Process pending Telegram updates
        if: steps.bot-hours.outputs.enabled == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          BOT_TIMEZONE: Europe/Lisbon
          DAILY_SEND_TIME: "08:00"
        run: |
          for attempt in $(seq 1 12); do
            echo "Polling Telegram updates, attempt ${attempt}/12"
            python bot.py --once
            if [ "$attempt" -lt 12 ]; then
              sleep 20
            fi
          done

      - name: Save bot state
        if: steps.bot-hours.outputs.enabled == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bot_state.json
          if git diff --cached --quiet; then
            echo "No bot state changes."
          else
            git commit -m "Update Telegram bot state"
            git pull --rebase
            git push
          fi
